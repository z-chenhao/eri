  <!-- Reading guide -->
  <text x="76" y="1242" class="note">Solid arrows: execution flow</text>
  <text x="310" y="1242" class="note">·</text>
  <text x="335" y="1242" class="note">Dotted lines: composed dependencies · paired arrowheads: bidirectional protocol</text>
  <text x="76" y="1282" class="note">Composition Root constructs modules only · Runtime is a durable shell, not a Workflow Engine · Skills are on-demand resources</text>
</svg>
