<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Eri Architecture</title>
  <desc id="desc">A calm hand-drawn overview of Eri's local-first daemon, resumable agent run, supporting systems, and process boundaries.</desc>

  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="1" seed="23" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.75" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="6.2" markerHeight="6.2" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#25282b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="6.2" markerHeight="6.2" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#287fbd"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="5.6" markerHeight="5.6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#747b80"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="5.8" markerHeight="5.8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d96c7c"/>
    </marker>
    <style>
      text {
        font-family: "Comic Sans MS", "Klee", "Noteworthy", cursive;
        fill: #25282b;
        font-weight: 400;
      }
      .rough { filter: url(#rough); }
      .title { font-size: 48px; font-weight: 700; fill: #dc3434; }
      .subtitle { font-size: 21px; fill: #6a6f73; }
      .boundary-title { font-size: 27px; font-weight: 700; fill: #dc3434; }
      .section-title { font-size: 28px; font-weight: 700; }
      .run-title { font-size: 22px; font-weight: 700; fill: #c9770b; }
      .node-title { font-size: 22px; font-weight: 700; text-anchor: middle; }
      .body { font-size: 19px; text-anchor: middle; }
      .small { font-size: 18px; text-anchor: middle; fill: #62686c; }
      .note { font-size: 18px; fill: #62686c; }
      .edge-label { font-size: 18px; fill: #4f5559; text-anchor: middle; }
      .outline { fill: #fff; stroke: #25282b; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .main-arrow { fill: none; stroke: #25282b; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .main-both { fill: none; stroke: #25282b; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-start: url(#arrow); marker-end: url(#arrow); }
      .support { fill: none; stroke: #747b80; stroke-width: 2.4; stroke-dasharray: 9 9; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-gray); }
      .protocol { fill: none; stroke: #858b90; stroke-width: 2.2; stroke-dasharray: 7 9; stroke-linecap: round; stroke-linejoin: round; marker-start: url(#arrow-gray); marker-end: url(#arrow-gray); }
      .protocol-source { fill: none; stroke: #858b90; stroke-width: 2.2; stroke-dasharray: 7 9; stroke-linecap: round; stroke-linejoin: round; marker-start: url(#arrow-gray); }
      .protocol-out { fill: none; stroke: #858b90; stroke-width: 2.2; stroke-dasharray: 7 9; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-gray); }
      .relation { fill: none; stroke: #858b90; stroke-width: 2.2; stroke-dasharray: 7 9; stroke-linecap: round; stroke-linejoin: round; }
      .blue-halo { fill: none; stroke: #fff; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
      .blue-arrow { fill: none; stroke: #287fbd; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .pink-arrow { fill: none; stroke: #d96c7c; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-pink); }
      .red-stroke { stroke: #dc3434; }
      .orange-stroke { stroke: #ed8b16; }
      .green-stroke { stroke: #219b69; }
      .pink-stroke { stroke: #db7180; }
      .blue-stroke { stroke: #287fbd; }
      .gray-stroke { stroke: #7d858a; }
      .green-text { fill: #15875a; }
      .pink-text { fill: #c95f70; }
      .blue-text { fill: #1f70aa; }
      .gray-text { fill: #677075; }
      .orange-text { fill: #c9770b; }
      .fill-green { fill: #d9f4df; }
      .fill-pink { fill: #fbdde1; }
      .fill-blue { fill: #dceefd; }
      .fill-orange { fill: #fff0cf; }
      .fill-gray { fill: #eff1f2; }
      .label-bg { fill: #fff; }
    </style>
  </defs>

  <rect width="2400" height="1350" fill="#fff"/>

  <!-- Header -->
  <text x="58" y="62" class="title">Eri Architecture</text>
  <text x="62" y="98" class="subtitle">local-first personal Agent Assistant</text>

