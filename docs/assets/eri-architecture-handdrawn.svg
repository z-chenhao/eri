  <text x="2215" y="375" class="body">Local Ollama</text>
  <text x="2215" y="409" class="body">DeepSeek via Secret Broker</text>
  <text x="2215" y="570" class="node-title">External Agents</text>
  <text x="2215" y="607" class="body">registered agent providers</text>
  <text x="2215" y="741" class="node-title">Plugins · MCP</text>
  <text x="2215" y="780" class="body">capabilities · external APIs</text>
  <text x="2215" y="996" class="node-title">System Observatory</text>
  <text x="2215" y="1038" class="body">read-only safe projections</text>

  <!-- External protocols use dedicated rails; only the short fan-out bends -->
  <g>
    <path d="M 906 379 C 882 370, 861 360, 845 348 L 845 275 Q 845 246 874 246 L 1570 246 Q 1600 246 1615 222 L 1635 191" class="protocol"/>
