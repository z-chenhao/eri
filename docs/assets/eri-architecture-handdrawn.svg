    <path d="M 1325 410 C 1360 408, 1400 408, 1435 410" class="main-arrow"/>
    <path d="M 1610 410 C 1628 408, 1643 408, 1660 410" class="main-arrow"/>
    <path d="M 1522 350 C 1522 308, 1450 292, 1385 298 C 1350 301, 1334 317, 1325 337" class="main-arrow"/>
    <path d="M 1782 490 C 1782 574, 1640 611, 1435 615 C 1030 623, 490 621, 270 600 C 210 594, 185 531, 185 450" class="main-arrow"/>
  </g>
  <rect x="1342" y="381" width="97" height="28" rx="8" class="label-bg"/>
  <text x="1390" y="402" class="edge-label">candidate</text>
  <rect x="1365" y="282" width="170" height="28" rx="8" class="label-bg"/>
  <text x="1450" y="303" class="edge-label">repair / escalate</text>
  <rect x="830" y="596" width="180" height="28" rx="8" class="label-bg"/>
  <text x="920" y="617" class="edge-label">deliver / reconcile</text>

