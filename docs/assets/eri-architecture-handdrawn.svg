    <rect x="600" y="350" width="220" height="115" rx="23" class="outline"/>
    <rect x="865" y="300" width="460" height="276" rx="30" fill="none" stroke="#ed8b16" stroke-width="4"/>
    <ellipse cx="950" cy="409" rx="61" ry="43" class="outline fill-pink"/>
    <rect x="1115" y="346" width="155" height="76" rx="19" class="outline"/>
    <rect x="1083" y="471" width="192" height="72" rx="19" class="outline fill-blue"/>
    <rect x="1435" y="350" width="175" height="115" rx="23" class="outline fill-blue"/>
    <rect x="1660" y="326" width="245" height="164" rx="25" class="outline fill-green"/>
    <path d="M 1660 379 L 1905 379 M 1660 434 L 1905 434" fill="none" stroke="#25282b" stroke-width="2.2"/>
  </g>
  <g class="rough">
    <rect x="1635" y="166" width="320" height="50" rx="17" class="outline fill-gray"/>
  </g>

  <text x="102" y="270" class="section-title orange-text">Online Assistant Runtime</text>
  <text x="185" y="411" class="node-title">Gateway</text>
  <text x="415" y="384" class="node-title">Durable Runtime</text>
  <text x="415" y="417" class="small">task · scheduler</text>
  <text x="415" y="441" class="small">lease · recovery</text>
  <text x="585" y="318" class="run-title">Resumable Agent Run</text>
  <text x="710" y="392" class="node-title">Context Assembly</text>
  <text x="710" y="428" class="small">primary context or scoped assignment</text>
  <text x="878" y="336" class="run-title">LLM-driven Agent Loop</text>
  <text x="950" y="416" class="node-title">Model</text>
  <text x="1192" y="393" class="node-title">Tool Call</text>
  <text x="1179" y="499" class="body">Governed</text>
  <text x="1179" y="526" class="body">Observation</text>
  <text x="1522" y="392" class="node-title">Eval</text>
  <text x="1522" y="427" class="small">LLM Judge</text>
  <text x="1782" y="363" class="node-title">Primary Delivery</text>
  <text x="1782" y="418" class="node-title">Outbox</text>
  <text x="1782" y="472" class="node-title">Receipt</text>
  <text x="1795" y="199" class="node-title">Model Gateway / Adapters</text>

  <!-- Main execution path -->
  <g>
    <path d="M 265 400 C 280 398, 295 398, 310 400" class="main-arrow"/>
    <path d="M 520 400 C 545 398, 575 398, 600 400" class="main-arrow"/>
    <path d="M 820 400 C 843 400, 866 402, 889 405" class="main-arrow"/>
