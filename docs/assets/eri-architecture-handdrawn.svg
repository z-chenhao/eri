  <g>
    <path d="M 620 132 L 620 165 Q 620 177 608 177 L 197 177 Q 185 177 185 189 L 185 350" class="main-both"/>
    <path d="M 1492 118 L 1492 202 Q 1492 214 1480 214 L 427 214 Q 415 214 415 226 L 415 335" class="main-arrow"/>
