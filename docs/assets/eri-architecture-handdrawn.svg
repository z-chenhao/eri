    <rect x="905" y="1040" width="350" height="86" rx="22" class="outline"/>

    <rect x="1340" y="790" width="180" height="85" rx="20" class="outline fill-blue"/>
    <rect x="1550" y="790" width="180" height="85" rx="20" class="outline"/>
    <rect x="1340" y="925" width="180" height="85" rx="20" class="outline"/>
