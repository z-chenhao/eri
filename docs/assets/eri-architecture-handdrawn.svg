  <text x="672" y="98" class="body">Conversation Workspace</text>
  <text x="890" y="98" class="body">CLI Chat</text>
  <text x="1137" y="98" class="body">Lark / Feishu Bot</text>
  <text x="1492" y="88" class="node-title">Time / Event</text>

