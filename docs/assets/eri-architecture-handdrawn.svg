    <rect x="1760" y="855" width="180" height="90" rx="20" class="outline fill-blue"/>
  </g>

  <text x="100" y="754" class="section-title gray-text">Replaceable Infrastructure</text>
  <text x="269" y="829" class="node-title">SQLite State + Events</text>
  <text x="269" y="866" class="small">state · indexes · outbox</text>
  <text x="269" y="898" class="small">safe event envelopes</text>
  <text x="269" y="995" class="node-title">Rotating Process Logs</text>
  <text x="269" y="1032" class="small">redacted JSON · bounded retention</text>
  <text x="269" y="1064" class="small">daemon · brokers · bootstrap</text>
  <text x="269" y="1132" class="small">separate stores · narrow interfaces</text>

  <text x="517" y="754" class="section-title green-text">Personal Context</text>
  <text x="590" y="824" class="body">Soul /</text>
  <text x="590" y="851" class="body">Identity</text>
  <text x="750" y="840" class="node-title">Memory</text>
  <text x="590" y="965" class="node-title">Skills</text>
  <text x="750" y="948" class="body">Encrypted</text>
  <text x="750" y="975" class="body">Content</text>
  <text x="670" y="1095" class="small">assembled only when relevant</text>

  <text x="902" y="754" class="section-title pink-text">Capability &amp; Safety</text>
  <text x="1080" y="825" class="body">Policy · Approval · Budget</text>
  <text x="985" y="956" class="body">Effect</text>
  <text x="985" y="983" class="body">Intent</text>
  <text x="1175" y="956" class="body">Tool</text>
  <text x="1175" y="983" class="body">Gateway</text>
  <text x="1080" y="1078" class="node-title">Provider / Plugin Bindings</text>
  <text x="1080" y="1109" class="small">roles · built-ins · MCP</text>

  <text x="1338" y="754" class="section-title blue-text">Evidence &amp; Improvement</text>
  <text x="1430" y="840" class="node-title">Event Spine</text>
  <text x="1640" y="827" class="body">Outcome /</text>
  <text x="1640" y="854" class="body">Feedback</text>
  <text x="1430" y="959" class="body">Episode /</text>
  <text x="1430" y="986" class="body">Dataset</text>
  <text x="1640" y="975" class="node-title">Evolution</text>
  <text x="1850" y="909" class="body">Observability</text>
  <text x="1642" y="1095" class="small">committed facts only</text>

  <!-- External capability rail stays in the whitespace between Runtime and support cards -->
  <path d="M 1255 1082 L 1268 1082 Q 1297 1082 1297 1053 L 1297 715 Q 1297 685 1327 685 L 1985 685" class="protocol-source"/>

