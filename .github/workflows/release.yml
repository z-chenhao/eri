name: Release candidate build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify unsigned candidate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pinned Go toolchain
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'
          test "$(git rev-parse "$RELEASE_TAG^{commit}")" = "$(git rev-parse "$GITHUB_SHA^{commit}")"

      - name: Verify repository
        run: make check

      - name: Build release archives
        env:
          RELEASE_OUTPUT: ${{ runner.temp }}/release-dist
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./scripts/build-release.sh "$RELEASE_TAG" "$RELEASE_OUTPUT"

      - name: Upload short-lived unsigned candidate archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ github.sha }}
          path: ${{ runner.temp }}/release-dist
          if-no-files-found: error
          retention-days: 7
